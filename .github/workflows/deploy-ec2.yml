name: Deploy web to EC2

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/deploy-ec2.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-southeast-1
      ECR_REPOSITORY: event-rsvp-web
      IMAGE_TAG: latest
      EC2_INSTANCE_ID: i-01b8a235413c6061a
      EC2_ENV_FILE_PATH: /opt/event-rsvp/.env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cách 1 (khuyến nghị): dùng OIDC + IAM role
      # Tạo IAM role (VD: event-rsvp-github-actions-role) với trust policy GitHub OIDC,
      # gắn quyền tối thiểu: ECR push, SSM send-command, STS get-caller-identity.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: event-rsvp-deploy

      # Nếu bạn chưa set up OIDC, có thể tạm dùng access key:
      # - name: Configure AWS credentials (access keys)
      #   if: false
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     AWS_REGION: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}

      - name: Build, push, and deploy via SSM
        working-directory: web
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          EC2_INSTANCE_ID: ${{ env.EC2_INSTANCE_ID }}
          EC2_ENV_FILE_PATH: ${{ env.EC2_ENV_FILE_PATH }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          chmod +x scripts/deploy-ec2.sh
          ./scripts/deploy-ec2.sh

