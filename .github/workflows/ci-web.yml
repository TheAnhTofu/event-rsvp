# Lint + typecheck + Vitest for `web/`. Fails on ESLint errors in `src/` or test failures.
name: CI web

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx eslint src

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm run test
